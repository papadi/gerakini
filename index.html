<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Παπαδημητρίου, Τζόκα - Γερακινή</title>
  <meta name="description" content="Τοποθεσία και φωτογραφία σπιτιού για Παπαδημητρίου, Τζόκα - Γερακινή." />
  <style>
    :root {
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #242424;
      --muted: #666666;
      --accent: #1d6f9f;
      --accent-dark: #15587d;
      --border: #ded8cc;
      --shadow: 0 18px 45px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(255,255,255,0.62), rgba(255,255,255,0.82)),
        var(--bg);
      min-height: 100vh;
    }

    .page {
      width: min(980px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .title-greek {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1.1rem, 2.5vw, 1.45rem);
      font-weight: 600;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .section {
      padding: 22px;
    }

    .section + .section {
      border-top: 1px solid var(--border);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 1.15rem;
    }

    .translation {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
    }

    .house-photo,
    .map-snapshot {
      width: 100%;
      display: block;
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    .house-photo {
      height: auto;
      max-height: 560px;
      object-fit: cover;
    }

    .map-snapshot-wrap {
      position: relative;
    }

    .map-link {
      display: block;
      color: inherit;
      text-decoration: none;
      border-radius: 16px;
    }

    .map-link:focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 4px;
    }

    .map-snapshot {
      min-height: 320px;
      background:
        linear-gradient(135deg, #d8e8d5 0 25%, transparent 25% 50%, #d8e8d5 50% 75%, transparent 75%),
        linear-gradient(45deg, #e8dfc9, #d1e2ef);
      background-size: 80px 80px, 100% 100%;
    }

    .map-placeholder {
      min-height: 320px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background:
        radial-gradient(circle at 52% 48%, rgba(29,111,159,0.18) 0 3px, transparent 4px),
        linear-gradient(32deg, transparent 0 42%, rgba(255,255,255,0.72) 42% 45%, transparent 45% 100%),
        linear-gradient(112deg, transparent 0 38%, rgba(255,255,255,0.72) 38% 41%, transparent 41% 100%),
        linear-gradient(18deg, #d7e8d2, #e8dfc9 45%, #cfe2ef);
      position: relative;
      overflow: hidden;
    }

    .pin {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 30px;
      height: 30px;
      background: #d81e1e;
      transform: translate(-50%, -100%) rotate(45deg);
      border-radius: 50% 50% 50% 0;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    .pin::after {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      left: 9px;
      top: 9px;
    }

    .coordinates {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .directions {
      display: block;
      margin-top: 18px;
      padding: 16px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-align: center;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .directions:focus,
    .directions:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .directions .translation {
      color: rgba(255,255,255,0.86);
      font-size: 0.92rem;
      margin-top: 2px;
    }

    footer {
      display: none;
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 20px, 980px); padding-top: 18px; }
      .section { padding: 14px; }
      .map-placeholder { min-height: 260px; }
      .directions { border-radius: 16px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <h1>Παπαδημητρίου, Τζόκα - Γερακινή</h1>
      <p class="title-greek">Papadimitriou, Tzoka - Gerakini</p>
    </header>

    <article class="card">
      <section class="section">
        <h2>Τοποθεσία <span class="translation">Location</span></h2>

        <a class="map-link" href="https://www.google.com/maps/place/40%C2%B016%2700.1%22N+23%C2%B027%2721.8%22E/@40.266703,23.456067,1190m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d40.266703!4d23.456067" target="_blank" rel="noopener" aria-label="Άνοιγμα τοποθεσίας στο Google Maps / Open location in Google Maps">
          <!--
            Replace this placeholder with a real Google Maps screenshot later, for example:
            <img class="map-snapshot" src="assets/google-maps-snapshot.jpg" alt="Στιγμιότυπο Google Maps με την πινέζα του σπιτιού / Google Maps snapshot showing the house pin" />
          -->
          <div class="map-placeholder" role="img" aria-label="Ενδεικτικός χάρτης με την πινέζα της τοποθεσίας / Map placeholder showing the location pin">
            <div class="pin" aria-hidden="true"></div>
            <div class="coordinates">40.266703, 23.456067</div>
          </div>
        </a>

        <a class="directions" href="https://www.google.com/maps/place/40%C2%B016%2700.1%22N+23%C2%B027%2721.8%22E/@40.266703,23.456067,1190m/data=!3m2!1e3!4b1!4m4!3m3!8m2!3d40.266703!4d23.456067" target="_blank" rel="noopener">
          Άνοιγμα χάρτη
          <span class="translation">Open map</span>
        </a>
      </section>

      <section class="section">
        <h2>Πρόσοψη του σπιτιού <span class="translation">Front of the house</span></h2>
        <!-- Replace assets/house-front.jpg with your preferred house photo. Keep the same filename to avoid editing this page. -->
        <img class="house-photo" src="assets/house-front.jpg" alt="Front of the house / Πρόσοψη του σπιτιού" />
      </section>
    </article>

    <footer>
      Coordinates: 40°16'00.1&quot;N 23°27'21.8&quot;E
    </footer>
  </main>
</body>
</html>
